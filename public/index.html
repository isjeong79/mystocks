<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AFM 실시간 주식 대시보드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/cards.css" />
  <link rel="stylesheet" href="css/modal.css" />
  <link rel="stylesheet" href="css/market-float.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <link rel="stylesheet" href="css/news-ticker.css" />
</head>
<body>

<h1>
  <span id="status"></span>AFM 실시간 주식 대시보드<img src="img/buddha.png" id="buddha-icon" alt="" />
  <div id="user-area">
    <span id="user-name" style="display:none"></span>
    <button id="btn-logout" style="display:none">로그아웃</button>
    <button class="auth-btn" id="btn-open-auth">로그인</button>
  </div>
</h1>

<!-- ── 뉴스 전광판 ──────────────────────────────────────────────────── -->
<div id="news-ticker" role="marquee" aria-label="실시간 뉴스">
  <div class="ticker-badge"><span class="ticker-badge-dot"></span>NEWS</div>
  <div class="ticker-viewport">
    <div id="news-ticker-track" aria-live="polite">
      <span class="ticker-set"><span class="ticker-item ticker-loading">뉴스를 불러오는 중...</span></span>
    </div>
  </div>
</div>

<div id="market-notice"></div>

<!-- 인증 모달 -->
<div id="auth-overlay">
  <div id="auth-modal">
    <h3>로그인</h3>
    <input type="text" id="auth-input" placeholder="사용자명 입력" maxlength="20" autocomplete="off" />
    <div id="auth-error"></div>
    <div class="auth-actions">
      <button class="auth-action-btn" id="btn-login">로그인</button>
      <button class="auth-action-btn" id="btn-register">신규등록</button>      
      <button class="auth-action-btn auth-btn" id="btn-auth-cancel">취소</button>
    </div>
  </div>
</div>

<!-- MY 종목 -->
<h2>MY 종목</h2>
<div class="stock-grid" id="stockGrid"></div>

<!-- 원자재 & 환율 -->
<h2>원자재 &amp; 환율</h2>
<div class="info-grid">
  <div class="info-card" id="card-WTI">
    <div class="info-label">WTI 원유</div>
    <div class="info-value flat" id="wti-price">-</div>
    <div class="info-sub flat"   id="wti-change">-</div>
  </div>
  <div class="info-card" id="card-BRENT">
    <div class="info-label">브렌트 원유</div>
    <div class="info-value flat" id="brent-price">-</div>
    <div class="info-sub flat"   id="brent-change">-</div>
  </div>
  <div class="info-card" id="card-USDKRW">
    <div class="info-label">원/달러 환율</div>
    <div class="info-value flat" id="fx-price">-</div>
    <div class="info-sub flat"   id="fx-change">-</div>
  </div>
</div>

<!-- 국내 지수 & 야간선물 -->
<h2>국내 지수</h2>
<div class="info-grid">
  <div class="info-card" id="card-KOSPI">
    <div class="info-label">KOSPI</div>
    <div class="info-value flat" id="kospi-price">-</div>
    <div class="info-sub flat"   id="kospi-change">-</div>
  </div>
  <div class="info-card" id="card-KOSDAQ">
    <div class="info-label">KOSDAQ</div>
    <div class="info-value flat" id="kosdaq-price">-</div>
    <div class="info-sub flat"   id="kosdaq-change">-</div>
  </div>
  <div class="info-card" id="card-KOSPI_NIGHT">
    <div class="info-label">코스피 야간선물</div>
    <div class="info-value flat" id="fut-price">-</div>
    <div class="info-sub flat"   id="fut-change">-</div>
  </div>
</div>

<!-- 종목 데이터 업데이트 (관리자 전용) -->
<div id="update-section" style="display:none">
  <button id="btn-update-stocks">종목데이터 업데이트</button>
  <span id="update-status"></span>
</div>

<!-- 종목 추가 모달 -->
<div id="modal-overlay">
  <div id="modal">
    <div id="modal-header">
      <span>종목 추가</span>
      <button id="modal-close">✕</button>
    </div>
    <div id="modal-tabs">
      <button class="modal-tab active" data-tab="domestic">국내주식</button>
      <button class="modal-tab"        data-tab="foreign">해외주식</button>
    </div>
    <div id="modal-search-wrap">
      <input type="text" id="search-input" placeholder="종목명 또는 종목코드 검색" autocomplete="off" />
    </div>
    <div id="search-results">
      <div class="search-hint">종목명이나 코드를 입력하세요</div>
    </div>
  </div>
</div>

<!-- 시장 상태 플로팅 바 -->
<div id="market-float">
  <div id="mf-body">
    <div class="mf-item item-flat" id="mf-item-dom">
      <span class="mf-dot mf-flat" id="mf-dom-dot"></span>
      <span class="mf-title">국내</span>
      <span class="mf-status mf-flat" id="mf-dom-lbl">-</span>
    </div>
    <div class="mf-item item-flat" id="mf-item-us">
      <span class="mf-dot mf-flat" id="mf-us-dot"></span>
      <span class="mf-title">미국</span>
      <span class="mf-status mf-flat" id="mf-us-lbl">-</span>
    </div>
    <div class="mf-item item-flat" id="mf-item-fut">
      <span class="mf-dot mf-flat" id="mf-fut-dot"></span>
      <span class="mf-title">야선</span>
      <span class="mf-status mf-flat" id="mf-fut-lbl">-</span>
    </div>
  </div>
  <span id="mf-mini-label">시장상황</span>
  <button id="mf-toggle">최소화</button>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
